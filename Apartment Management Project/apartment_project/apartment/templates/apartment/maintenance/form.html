{% extends 'apartment/base.html' %}
{% block content %}
<h2>{{ title }}</h2>
<div class="card mt-3" style="max-width: 500px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors }}</div>
                {% endif %}
            </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary">บันทึก</button>
            <a href="{% url 'maintenance_list' %}" class="btn btn-secondary">ยกเลิก</a>
        </form>
    </div>
</div>
{% endblock %}
