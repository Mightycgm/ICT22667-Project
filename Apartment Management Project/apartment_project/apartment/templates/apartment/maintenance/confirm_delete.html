{% extends 'apartment/base.html' %}
{% block content %}
<div class="card border-0 shadow-sm">
    <div class="card-body text-center py-5">
        <div style="font-size: 3rem; margin-bottom: 16px;">⚠️</div>
        <h4 class="mb-3">{{ title }}</h4>
        <p class="text-muted mb-1">คุณต้องการลบรายการแจ้งซ่อมนี้ใช่หรือไม่?</p>
        <p class="fw-bold mb-4">แจ้งซ่อม #{{ object.Maintenance_ID }} — {{ object.Room_ID }} — {{ object.Problem_Detail }}</p>
        <form method="post">
            {% csrf_token %}
            <a href="{% url 'maintenance_list' %}" class="btn btn-secondary me-2">ยกเลิก</a>
            <button type="submit" class="btn btn-danger">ยืนยันลบ</button>
        </form>
    </div>
</div>
{% endblock %}
