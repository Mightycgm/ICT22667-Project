{% extends 'apartment/base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>รายการห้องพัก</h2>
    <a href="{% url 'room_create' %}" class="btn btn-primary">+ เพิ่มห้องพัก</a>
</div>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th><th>เลขห้อง</th><th>อาคาร</th><th>ชั้น</th><th>สถานะ</th><th>จัดการ</th>
        </tr>
    </thead>
    <tbody>
        {% for r in rooms %}
        <tr>
            <td>{{ r.Room_ID }}</td>
            <td>{{ r.Room_Number }}</td>
            <td>{{ r.Building_No }}</td>
            <td>{{ r.Floor }}</td>
            <td>{{ r.Status }}</td>
            <td>
                <a href="{% url 'room_edit' r.Room_ID %}" class="btn btn-sm btn-warning">แก้ไข</a>
                <a href="{% url 'room_delete' r.Room_ID %}" class="btn btn-sm btn-danger">ลบ</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="6" class="text-center text-muted">ไม่พบข้อมูล</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
