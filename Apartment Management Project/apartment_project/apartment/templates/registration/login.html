<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-header {
            background: #212529;
            color: white;
            border-radius: 12px 12px 0 0;
            padding: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card bg-white">
        <div class="login-header">
            <h4 class="mb-0">🏢 ระบบจัดการอพาร์ทเม้นต์</h4>
            <small class="text-secondary">กรุณาเข้าสู่ระบบก่อนใช้งาน</small>
        </div>
        <div class="p-4">
            <form method="post">
                {% csrf_token %}
                {% if form.errors %}
                    <div class="alert alert-danger py-2">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
                {% endif %}
                <div class="mb-3">
                    <label class="form-label">ชื่อผู้ใช้</label>
                    <input type="text" name="username" class="form-control" autofocus required>
                </div>
                <div class="mb-4">
                    <label class="form-label">รหัสผ่าน</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100">เข้าสู่ระบบ</button>
            </form>
        </div>
    </div>
</body>
</html>
